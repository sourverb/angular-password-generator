<div class="container">
  <h1>Generate a<br> <span>Random Password</span></h1>

  <div class="display">
    <input type="text" [value]="password" placeholder="Password">
    <img src="copy.png" (click)="copy()">
  </div>

  <div *ngIf="password" class="strength-box">
    <p>
      Strength:
      <span [ngClass]="strength.toLowerCase()">
        {{strength}}
      </span>
    </p>

    <div class="bar">
      <div class="fill" [style.width.%]="strengthValue" [ngClass]="strength.toLowerCase()">
      </div>
    </div>
  </div>

  <div class="options">
    <div class="range">
      <label>
        Password length: {{length}}
      </label>
      <input type="range" min="1" max="30" [(ngModel)]="length">
    </div>
  </div>

  <div class="options">
    <div class="checkbox">
      <label><input type="checkbox" [(ngModel)]="includeUpperCase">Uppercase Letters</label>
      <label><input type="checkbox" [(ngModel)]="includeLowerCase">Lowercse Letters </label>
      <label><input type="checkbox" [(ngModel)]="includeNumbers">Numbers </label>
      <label><input type="checkbox" [(ngModel)]="includeSymbols">Special characters</label>

    </div>
  </div>

  <button (click)="createPassword()">
    <img src="generate.png">
    Generate Password
  </button>

</div>
